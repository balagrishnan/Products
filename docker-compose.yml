version: '3.8'

services:
  # 1. Your Kafka Broker Container
  kafka-local:
    image: apache/kafka:latest
    container_name: kafka-local
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-local:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # 2. Your Containerized Spring Boot App
  product-service-java:
    build: . # Looks for a Dockerfile in your product project root
    container_name: product-service-java
    ports:
      - "8081:8081"
    depends_on:
      - kafka-local # Ensures Kafka starts up first
    environment:
      # Overrides application.properties dynamically inside the container
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-local:9092